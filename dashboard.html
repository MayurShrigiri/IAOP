<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAOP — My Classes</title>
    <meta name="description" content="IAOP Dashboard — View and manage all your enrolled classes.">
    <link rel="stylesheet" href="css/globals.css?v=19">
    <link rel="stylesheet" href="css/components.css?v=19">
    <script src="js/theme.js?v=19"></script>
    <style>
        .dash-page{min-height:100vh;background:var(--bg-body)}

        /* Hero */
        .dash-hero{
            background:linear-gradient(135deg,rgba(16,185,129,0.06),rgba(13,148,136,0.03));
            border-bottom:1px solid var(--border);padding:1.75rem 1.25rem;
        }
        .dash-hero h2{font-size:1.4rem;font-weight:800;margin-bottom:0.25rem;color:var(--text-primary)}
        .dash-hero h2 span{color:var(--primary)}
        .dash-hero p{font-size:0.875rem;color:var(--text-muted)}

        /* Quick actions */
        .quick-bar{display:flex;gap:0.625rem;margin-bottom:1.5rem;flex-wrap:wrap}

        /* Profile info area in dropdown */
        .nav-user-name{font-size:0.875rem;font-weight:600;color:var(--text-primary);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

        /* Navbar right section */
        .nav-right{display:flex;align-items:center;gap:0.5rem}

        /* Empty state full page */
        .empty-page{padding:4rem 1rem;text-align:center}
    </style>
</head>
<body class="dash-page">

    <!-- Navbar -->
    <nav class="navbar">
        <a href="dashboard.html" class="nav-brand">
            <div class="nav-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            </div>
            <span class="nav-brand-text">IAOP</span>
        </a>

        <div class="nav-spacer"></div>

        <div class="nav-right">

            <!-- Profile -->
            <div class="dropdown">
                <div class="avatar" id="btn-profile-menu" tabindex="0" role="button" aria-label="Profile menu">?</div>
                <div class="dropdown-menu" id="profile-dropdown">
                    <div class="profile-header">
                        <div class="profile-name" id="user-name">Loading...</div>
                        <div class="profile-email" id="user-email"></div>
                    </div>
                    <div class="dropdown-sep"></div>
                    <button class="dropdown-item" id="theme-toggle">
                        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                        Toggle Theme
                    </button>
                    <div class="dropdown-sep"></div>
                    <button class="dropdown-item danger" id="btn-logout-trigger">
                        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        Sign out
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="dash-hero">
        <div class="container">
            <h2>My Classes <span id="greeting-name"></span></h2>
            <p id="class-count-text">Loading your classes...</p>
        </div>
    </div>

    <!-- Main -->
    <main class="container" style="padding-top:1.5rem;padding-bottom:3rem;">


        <div class="quick-bar">
            <button class="btn btn-secondary btn-sm" id="qa-join" style="padding: 0.5rem 1rem; border-radius: 9999px;">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
                Join a Class
            </button>
            <button class="btn btn-primary btn-sm" id="qa-create" style="padding: 0.5rem 1rem; border-radius: 9999px; box-shadow: 0 4px 12px var(--primary-glow);">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                Create Class
            </button>
        </div>

        <div id="class-list" class="class-grid"></div>
    </main>

    <!-- Modal: Create Class -->
    <div id="modal-create-class" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Create New Class</h3>
                <button class="btn btn-ghost btn-icon close-modal">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form id="form-create-class">
                <div class="modal-body" style="padding-bottom:0">
                    <div class="form-group">
                        <label class="form-label">Class Name</label>
                        <input type="text" id="create-class-name" class="input" placeholder="e.g., Mathematics XII-A" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Subject / Course</label>
                        <input type="text" id="create-class-subject" class="input" placeholder="e.g., Mathematics" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline close-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Class</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Join Class -->
    <div id="modal-join-class" class="modal-overlay">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h3 class="modal-title">Join a Class</h3>
                <button class="btn btn-ghost btn-icon close-modal">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form id="form-join-class">
                <div class="modal-body" style="padding-bottom:0">
                    <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1rem;">Enter the 6-character class code given by your teacher.</p>
                    <div class="form-group">
                        <label class="form-label">Class Code</label>
                        <input type="text" id="join-class-code" class="input" maxlength="6" style="text-transform:uppercase;letter-spacing:0.25em;font-size:1.1rem;font-weight:700;text-align:center;" placeholder="ABCD12" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline close-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Join Class</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Logout Confirm -->
    <div id="modal-logout-confirm" class="modal-overlay">
        <div class="modal modal-sm">
            <div class="modal-body" style="text-align:center;padding:2rem">
                <div class="empty-icon" style="background:var(--danger-soft);border-color:rgba(239,68,68,0.2);color:var(--danger);margin-bottom:1rem">
                    <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                </div>
                <h3 style="margin-bottom:0.5rem;">Sign out of IAOP?</h3>
                <p style="color:var(--text-muted);font-size:0.875rem;margin-bottom:1.75rem;">You can sign back in at any time.</p>
                <div style="display:flex;gap:0.75rem;">
                    <button type="button" class="btn btn-outline btn-full close-modal">Cancel</button>
                    <button type="button" class="btn btn-danger btn-full" id="btn-confirm-logout">Sign Out</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="js/firebase-config.js?v=19"></script>
    <script src="js/auth.js?v=19"></script>
    <script src="js/dashboard.js?v=19"></script>
    <script>
        document.getElementById('qa-join').addEventListener('click', () => openModal('modal-join-class'));
        document.getElementById('qa-create').addEventListener('click', () => openModal('modal-create-class'));
    </script>
</body>
</html>
