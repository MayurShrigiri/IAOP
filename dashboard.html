<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAOP - Dashboard</title>
    <link rel="stylesheet" href="css/globals.css">
    <link rel="stylesheet" href="css/components.css">
    <script src="js/theme.js"></script>
    <style>
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 2rem 0;
        }
        .class-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .class-card {
            cursor: pointer;
        }
        .class-role-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: rgba(59, 130, 246, 0.2);
            color: var(--primary);
        }
        .class-role-badge.owner { background: rgba(139, 92, 246, 0.2); color: var(--accent); }
    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav class="navbar glass">
        <div class="logo">IAOP <span>Dashboard</span></div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <span id="user-name" style="font-weight: 600;">Loading...</span>
            <button id="theme-toggle" class="btn btn-outline" style="padding: 0.5rem 1rem; border: none; font-size: 1.2rem;">🌙</button>
            <button id="btn-logout" class="btn btn-outline" style="padding: 0.5rem 1rem;">Logout</button>
        </div>
    </nav>

    <main class="container">
        <div class="dashboard-header">
            <h2>Your Classes</h2>
            <div style="display: flex; gap: 1rem;">
                <button id="btn-join-class" class="btn btn-outline">Join Class</button>
                <button id="btn-create-class" class="btn btn-primary">Create Class</button>
            </div>
        </div>

        <div id="class-list" class="class-grid">
            <!-- Classes will be injected here -->
            <div class="glass glass-panel" style="grid-column: 1 / -1; text-align: center; color: var(--text-muted);">
                Loading classes...
            </div>
        </div>
    </main>

    <!-- Modal for Create Class -->
    <div id="modal-create-class" class="modal-overlay">
        <div class="modal-content glass glass-panel">
            <h3 style="margin-bottom: 1.5rem;">Create a New Class</h3>
            <form id="form-create-class">
                <div class="input-group">
                    <label class="input-label">Class Name</label>
                    <input type="text" id="create-class-name" class="input-field" required>
                </div>
                <div class="input-group">
                    <label class="input-label">Subject/Course</label>
                    <input type="text" id="create-class-subject" class="input-field" required>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                    <button type="button" class="btn btn-outline close-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for Join Class -->
    <div id="modal-join-class" class="modal-overlay">
        <div class="modal-content glass glass-panel">
            <h3 style="margin-bottom: 1.5rem;">Join a Class</h3>
            <form id="form-join-class">
                <div class="input-group">
                    <label class="input-label">Class Code (6-digit)</label>
                    <input type="text" id="join-class-code" class="input-field" maxlength="6" style="text-transform: uppercase;" required>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                    <button type="button" class="btn btn-outline close-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Join</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
