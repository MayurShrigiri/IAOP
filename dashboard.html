<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAOP – My Classes</title>
    <meta name="description" content="IAOP Dashboard – View and manage all your enrolled classes.">
    <link rel="stylesheet" href="css/globals.css?v=3">
    <link rel="stylesheet" href="css/components.css?v=3">
    <script src="js/theme.js?v=3"></script>
    <style>
        /* ── Dashboard Page Specific ─── */
        .dashboard-body {
            min-height: 100vh;
            background: var(--bg-main);
        }

        /* Hero greeting strip */
        .dashboard-hero {
            background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(139,92,246,0.08));
            border-bottom: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
        }

        .dashboard-hero h2 {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
        }

        .dashboard-hero h2 span {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .dashboard-hero p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Class grid */
        .class-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }

        @media (max-width: 480px) {
            .class-grid { grid-template-columns: 1fr; }
        }

        /* Class card */
        .class-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            box-shadow: var(--shadow-card);
            transition: all var(--transition-base);
            animation: fadeSlideUp 0.4s ease both;
        }

        .class-card:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-card), var(--shadow-glow);
            transform: translateY(-4px);
        }

        .class-card-header {
            height: 88px;
            display: flex;
            align-items: flex-end;
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }

        .class-card-icon {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 42px;
            height: 42px;
            background: rgba(255,255,255,0.15);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            font-size: 1.25rem;
        }

        .class-card-body {
            padding: 1.25rem;
            padding-top: 0.875rem;
        }

        .class-card-name {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .class-card-subject {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .class-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 0.875rem;
            border-top: 1px solid var(--border-color);
        }

        /* Role color themes */
        .role-owner .class-card-header { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .role-teacher .class-card-header { background: linear-gradient(135deg, #06b6d4, #6366f1); }
        .role-student .class-card-header { background: linear-gradient(135deg, #10b981, #06b6d4); }
        .role-cr .class-card-header { background: linear-gradient(135deg, #f59e0b, #ef4444); }

        /* Profile dropdown */
        #profile-dropdown {
            min-width: 220px;
        }

        .profile-info {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(139,92,246,0.05));
        }

        .profile-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-main);
            margin-bottom: 0.15rem;
        }

        .profile-email {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Quick actions row */
        .quick-actions {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.75rem;
        }

        .quick-action-btn {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-sub);
            font-family: var(--font-sans);
            transition: all var(--transition-base);
            box-shadow: var(--shadow-sm);
        }

        .quick-action-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-soft);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .quick-action-btn svg {
            width: 16px;
            height: 16px;
        }

        /* Section header */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
        }

        .section-header h3 {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* Modal body padding */
        .modal-content form { }
        .modal-footer {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body class="dashboard-body">

    <!-- Top Navigation -->
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="brand-icon">📚</div>
            <span class="brand-text">IAOP</span>
        </div>

        <div style="display: flex; align-items: center; gap: 0.75rem;">
            <!-- Join Class -->
            <button class="btn btn-outline btn-icon" id="btn-join-class" title="Join Class" style="width: auto; padding: 0.5rem 0.875rem; gap: 0.4rem; font-size: 0.8rem;">
                <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
                Join
            </button>

            <!-- Create Class -->
            <button class="btn btn-primary" id="btn-create-class" style="padding: 0.5rem 0.875rem; gap: 0.4rem; font-size: 0.8rem;">
                <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                Create
            </button>

            <!-- Profile Dropdown -->
            <div class="dropdown">
                <div class="avatar" id="btn-profile-menu" title="Profile">?</div>
                <div class="dropdown-menu" id="profile-dropdown">
                    <div class="profile-info">
                        <div class="profile-name" id="user-name">Loading...</div>
                        <div class="profile-email" id="user-email"></div>
                    </div>
                    <button class="dropdown-item" id="theme-toggle">
                        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                        Toggle Theme
                    </button>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item danger" id="btn-logout-trigger">
                        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        Sign Out
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Dashboard Hero -->
    <div class="dashboard-hero">
        <div class="container">
            <h2>Your Classes <span id="greeting-name"></span></h2>
            <p id="class-count-text">Loading your enrolled classes...</p>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container" style="padding-top: 2rem; padding-bottom: 3rem;">

        <!-- Quick Actions -->
        <div class="quick-actions">
            <button class="quick-action-btn" id="qa-join-class">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
                Join a Class
            </button>
            <button class="quick-action-btn" id="qa-create-class">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                Create Class
            </button>
        </div>

        <!-- Classes Grid -->
        <div class="section-header">
            <h3>Enrolled Classes</h3>
        </div>
        <div id="class-list" class="class-grid"></div>
    </main>

    <!-- Modal: Create Class -->
    <div id="modal-create-class" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Create New Class</h3>
                <button class="btn btn-ghost btn-icon close-modal">
                    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form id="form-create-class">
                <div class="input-group">
                    <label class="input-label">Class Name</label>
                    <input type="text" id="create-class-name" class="input-field" placeholder="e.g., Mathematics XII-A" required>
                </div>
                <div class="input-group">
                    <label class="input-label">Subject / Course</label>
                    <input type="text" id="create-class-subject" class="input-field" placeholder="e.g., Mathematics" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline close-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Class</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Join Class -->
    <div id="modal-join-class" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Join a Class</h3>
                <button class="btn btn-ghost btn-icon close-modal">
                    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form id="form-join-class">
                <p style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1.25rem;">Enter the 6-character class code provided by your teacher.</p>
                <div class="input-group">
                    <label class="input-label">Class Code</label>
                    <input type="text" id="join-class-code" class="input-field" maxlength="6" style="text-transform: uppercase; letter-spacing: 0.2em; font-size: 1.2rem; text-align: center; font-weight: 700;" placeholder="ABCD12" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline close-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Join Class</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Logout Confirm -->
    <div id="modal-logout-confirm" class="modal-overlay">
        <div class="modal-content" style="max-width: 380px; text-align: center;">
            <div style="width: 56px; height: 56px; background: var(--danger-soft); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; font-size: 1.5rem;">🚪</div>
            <h3 style="margin-bottom: 0.5rem;">Sign out of IAOP?</h3>
            <p style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 2rem;">You'll need to sign in again to access your classes.</p>
            <div style="display: flex; gap: 0.75rem;">
                <button type="button" class="btn btn-outline close-modal" style="flex: 1;">Cancel</button>
                <button type="button" class="btn btn-danger" id="btn-confirm-logout" style="flex: 1;">Sign Out</button>
            </div>
        </div>
    </div>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="js/firebase-config.js?v=3"></script>
    <script src="js/auth.js?v=3"></script>
    <script src="js/dashboard.js?v=3"></script>
    <script>
        // Wire up quick action buttons to same modals
        document.getElementById('qa-join-class').addEventListener('click', () => openModal('modal-join-class'));
        document.getElementById('qa-create-class').addEventListener('click', () => openModal('modal-create-class'));
    </script>
</body>
</html>
