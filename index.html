<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAOP – Sign In</title>
    <meta name="description" content="IAOP – Intelligent Academic Operations Platform. Sign in to manage your classes, attendance, and assignments.">
    <link rel="stylesheet" href="css/globals.css?v=3">
    <link rel="stylesheet" href="css/components.css?v=3">
    <script src="js/theme.js?v=3"></script>
    <style>
        /* ── Login Page Specific ─── */
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            background: var(--gradient-hero);
        }

        /* Animated background orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            pointer-events: none;
        }

        .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #6366f1, transparent);
            top: -120px; left: -120px;
            animation: float 8s ease-in-out infinite;
        }

        .orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #8b5cf6, transparent);
            bottom: -100px; right: -80px;
            animation: floatReverse 10s ease-in-out infinite;
        }

        .orb-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, #06b6d4, transparent);
            top: 40%; right: 15%;
            animation: float 12s ease-in-out infinite 2s;
        }

        /* Mesh grid pattern */
        .auth-page::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(99,102,241,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.06) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .auth-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
        }

        /* Logo area */
        .auth-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
            text-align: center;
        }

        .auth-logo-mark {
            width: 64px;
            height: 64px;
            background: var(--gradient-primary);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 800;
            color: white;
            box-shadow: 0 8px 32px rgba(99,102,241,0.4), 0 0 0 1px rgba(99,102,241,0.3);
            margin-bottom: 1rem;
            animation: pulse-glow 3s infinite;
            letter-spacing: -0.05em;
        }

        .auth-logo h1 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-sub);
            letter-spacing: 0.02em;
        }

        .auth-logo p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* Form title */
        .form-title {
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 0.35rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 1.75rem;
        }

        /* Google button */
        .btn-google {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border-hover);
            color: var(--text-main);
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-sans);
            transition: all var(--transition-base);
        }

        .btn-google:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }

        .btn-google img {
            width: 18px;
            height: 18px;
        }

        /* Auth footer link */
        .auth-switch {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .auth-switch a {
            color: var(--primary);
            font-weight: 700;
            cursor: pointer;
            transition: color var(--transition-fast);
        }

        .auth-switch a:hover { color: var(--secondary); }

        /* Theme toggle */
        .theme-pill {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            z-index: 20;
        }

        .theme-pill button {
            background: rgba(26,26,46,0.7);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            color: var(--text-sub);
            padding: 0.5rem 0.875rem;
            border-radius: var(--radius-full);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-sans);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all var(--transition-fast);
        }

        .theme-pill button:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        html[data-theme="light"] .theme-pill button {
            background: rgba(255,255,255,0.8);
        }

        /* Input enhancements */
        .input-with-icon {
            position: relative;
        }

        .input-with-icon .input-icon {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 16px;
            height: 16px;
            pointer-events: none;
        }

        .input-with-icon .input-field {
            padding-left: 2.625rem;
        }
    </style>
</head>
<body>
    <!-- Theme Toggle -->
    <div class="theme-pill">
        <button id="theme-toggle">
            <span id="theme-icon">🌙</span>
            <span id="theme-label">Dark</span>
        </button>
    </div>

    <!-- Animated Background -->
    <div class="auth-page">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>

        <div class="auth-wrapper">
            <!-- Logo -->
            <div class="auth-logo animate-fadeSlideUp">
                <div class="auth-logo-mark">IA</div>
                <h1>IAOP Platform</h1>
                <p>Intelligent Academic Operations</p>
            </div>

            <!-- Auth Card -->
            <div class="auth-card animate-fadeSlideUp" style="animation-delay: 0.1s;">

                <!-- Login Form -->
                <form id="login-form">
                    <div class="form-title">Welcome Back</div>
                    <div class="form-subtitle">Sign in to continue to your classes</div>

                    <div class="input-group">
                        <label class="input-label" for="login-email">Email Address</label>
                        <div class="input-with-icon">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                            <input type="email" id="login-email" class="input-field" placeholder="you@example.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="input-label" for="login-password">Password</label>
                        <div class="input-with-icon">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path stroke-linecap="round" stroke-linejoin="round" d="M7 11V7a5 5 0 0110 0v4"/></svg>
                            <input type="password" id="login-password" class="input-field" placeholder="Enter your password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-full" style="padding: 0.8rem; font-size: 0.95rem; margin-bottom: 1rem;">
                        Sign In
                    </button>

                    <div class="divider-text">OR</div>

                    <button type="button" class="btn-google" id="login-google-btn">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                        Continue with Google
                    </button>

                    <div class="auth-switch">
                        Don't have an account? <a id="show-signup">Create one</a>
                    </div>
                </form>

                <!-- Signup Form -->
                <form id="signup-form" style="display: none;">
                    <div class="form-title">Create Account</div>
                    <div class="form-subtitle">Join IAOP and start managing your classes</div>

                    <div class="input-group">
                        <label class="input-label" for="signup-name">Full Name</label>
                        <div class="input-with-icon">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                            <input type="text" id="signup-name" class="input-field" placeholder="John Doe" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="input-label" for="signup-email">Email Address</label>
                        <div class="input-with-icon">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                            <input type="email" id="signup-email" class="input-field" placeholder="you@example.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="input-label" for="signup-password">Password</label>
                        <div class="input-with-icon">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path stroke-linecap="round" stroke-linejoin="round" d="M7 11V7a5 5 0 0110 0v4"/></svg>
                            <input type="password" id="signup-password" class="input-field" placeholder="Create a strong password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-full" style="padding: 0.8rem; font-size: 0.95rem; margin-bottom: 1rem;">
                        Create Account
                    </button>

                    <div class="divider-text">OR</div>

                    <button type="button" class="btn-google" id="signup-google-btn">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                        Sign up with Google
                    </button>

                    <div class="auth-switch">
                        Already have an account? <a id="show-login">Sign in</a>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="js/firebase-config.js?v=3"></script>
    <script src="js/auth.js?v=3"></script>
    <script>
        requireAuth();

        // Theme toggle
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const themeLabel = document.getElementById('theme-label');

        function updateThemeBtn() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            themeIcon.textContent = isDark ? '☀️' : '🌙';
            themeLabel.textContent = isDark ? 'Light' : 'Dark';
        }

        updateThemeBtn();

        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('iaop-theme', next);
            updateThemeBtn();
        });

        // Auth form switching
        document.getElementById('show-signup').addEventListener('click', toggleAuthMode);
        document.getElementById('show-login').addEventListener('click', toggleAuthMode);
        document.getElementById('login-form').addEventListener('submit', handleLogin);
        document.getElementById('signup-form').addEventListener('submit', handleSignup);
        document.getElementById('login-google-btn').addEventListener('click', handleGoogleLogin);
        document.getElementById('signup-google-btn').addEventListener('click', handleGoogleLogin);
    </script>
</body>
</html>
