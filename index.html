<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAOP — Sign In</title>
    <meta name="description" content="IAOP – Intelligent Academic Operations Platform. Sign in to manage classes, attendance, and assignments.">
    <link rel="stylesheet" href="css/globals.css?v=15">
    <link rel="stylesheet" href="css/components.css?v=15">
    <script src="js/theme.js?v=15"></script>
    <style>
        .auth-page{
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            padding:1.5rem;background:var(--gradient-hero);position:relative;overflow:hidden;
        }
        /* Soft decorative circles */
        .auth-deco{position:absolute;border-radius:50%;pointer-events:none}
        .auth-deco-1{width:360px;height:360px;background:radial-gradient(circle,rgba(16,185,129,0.12),transparent);top:-100px;left:-100px}
        .auth-deco-2{width:280px;height:280px;background:radial-gradient(circle,rgba(13,148,136,0.1),transparent);bottom:-80px;right:-60px}
        .auth-deco-3{width:180px;height:180px;background:radial-gradient(circle,rgba(16,185,129,0.08),transparent);top:30%;right:10%;animation:float 8s ease-in-out infinite}

        .auth-wrapper{position:relative;z-index:1;width:100%;max-width:400px}

        .auth-logo-mark{
            width:52px;height:52px;background:var(--gradient-brand);border-radius:var(--radius-lg);
            display:flex;align-items:center;justify-content:center;margin:0 auto 0.875rem;
            box-shadow:0 4px 16px rgba(16,185,129,0.35);
        }
        .auth-logo-mark svg{width:26px;height:26px;stroke:#fff;fill:none}

        .auth-brand{text-align:center;margin-bottom:1.75rem}
        .auth-brand h1{font-size:1.5rem;font-weight:800;color:var(--primary);letter-spacing:-0.02em;margin-bottom:0.25rem}
        .auth-brand p{font-size:0.85rem;color:var(--text-secondary)}

        .form-switch{text-align:center;margin-top:1.25rem;font-size:0.85rem;color:var(--text-secondary)}
        .form-switch a{color:var(--primary);font-weight:600;cursor:pointer}
        .form-switch a:hover{color:var(--primary-dark)}

        /* Theme toggle */
        .theme-btn{
            position:fixed;top:1rem;right:1rem;z-index:50;
            display:flex;align-items:center;gap:0.4rem;padding:0.4rem 0.75rem;
            background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-full);
            font-size:0.78rem;font-weight:600;color:var(--text-secondary);cursor:pointer;
            font-family:var(--font);box-shadow:var(--shadow-sm);
            transition:all var(--dur-fast) var(--ease);
        }
        .theme-btn:hover{border-color:var(--primary);color:var(--primary)}
        .theme-btn svg{width:14px;height:14px}
    </style>
</head>
<body>

    <button class="theme-btn" id="theme-toggle">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        <span>Toggle Theme</span>
    </button>

    <div class="auth-page">
        <div class="auth-deco auth-deco-1"></div>
        <div class="auth-deco auth-deco-2"></div>
        <div class="auth-deco auth-deco-3"></div>

        <div class="auth-wrapper animate-in">
            <div class="auth-brand">
                <div class="auth-logo-mark">
                    <svg viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                </div>
                <h1>IAOP</h1>
                <p>Intelligent Academic Operations Platform</p>
            </div>

            <div class="auth-card">
                <!-- Login Form -->
                <form id="login-form">
                    <h2 style="font-size:1.15rem;font-weight:700;margin-bottom:0.25rem;">Welcome back</h2>
                    <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1.5rem;">Sign in to your account</p>

                    <div class="form-group">
                        <label class="form-label" for="login-email">Email address</label>
                        <div class="input-wrap">
                            <span class="input-icon">
                                <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                            </span>
                            <input type="email" id="login-email" class="input" placeholder="you@example.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="login-password">Password</label>
                        <div class="input-wrap">
                            <span class="input-icon">
                                <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path stroke-linecap="round" stroke-linejoin="round" d="M7 11V7a5 5 0 0110 0v4"/></svg>
                            </span>
                            <input type="password" id="login-password" class="input" placeholder="Enter your password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full" style="padding:0.75rem;font-size:0.9rem;margin-bottom:1rem;">
                        Sign In
                    </button>

                    <div class="divider-text">or</div>

                    <button type="button" class="btn-google" id="login-google-btn">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="" width="18" height="18">
                        Continue with Google
                    </button>

                    <div class="form-switch">
                        Don't have an account? <a id="show-signup">Create account</a>
                    </div>
                </form>

                <!-- Signup Form -->
                <form id="signup-form" style="display:none;">
                    <h2 style="font-size:1.15rem;font-weight:700;margin-bottom:0.25rem;">Create account</h2>
                    <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1.5rem;">Join IAOP today — it's free</p>

                    <div class="form-group">
                        <label class="form-label" for="signup-name">Full name</label>
                        <div class="input-wrap">
                            <span class="input-icon">
                                <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                            </span>
                            <input type="text" id="signup-name" class="input" placeholder="Your full name" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="signup-email">Email address</label>
                        <div class="input-wrap">
                            <span class="input-icon">
                                <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                            </span>
                            <input type="email" id="signup-email" class="input" placeholder="you@example.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="signup-password">Password</label>
                        <div class="input-wrap">
                            <span class="input-icon">
                                <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path stroke-linecap="round" stroke-linejoin="round" d="M7 11V7a5 5 0 0110 0v4"/></svg>
                            </span>
                            <input type="password" id="signup-password" class="input" placeholder="Minimum 6 characters" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full" style="padding:0.75rem;font-size:0.9rem;margin-bottom:1rem;">
                        Create Account
                    </button>

                    <div class="divider-text">or</div>

                    <button type="button" class="btn-google" id="signup-google-btn">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="" width="18" height="18">
                        Sign up with Google
                    </button>

                    <div class="form-switch">
                        Already have an account? <a id="show-login">Sign in</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="js/firebase-config.js?v=15"></script>
    <script src="js/auth.js?v=15"></script>

    <script>
        requireAuth();
        // Form toggle
        document.getElementById('show-signup').addEventListener('click', toggleAuthMode);
        document.getElementById('show-login').addEventListener('click', toggleAuthMode);
        document.getElementById('login-form').addEventListener('submit', handleLogin);
        document.getElementById('signup-form').addEventListener('submit', handleSignup);
        document.getElementById('login-google-btn').addEventListener('click', handleGoogleLogin);
        document.getElementById('signup-google-btn').addEventListener('click', handleGoogleLogin);

        // Theme toggle
        const lbl = document.getElementById('theme-label');
        function syncThemeBtn() {
            const dark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (lbl) lbl.textContent = dark ? 'Light' : 'Dark';
        }
        syncThemeBtn();
        document.getElementById('theme-toggle').addEventListener('click', () => {
            const cur = document.documentElement.getAttribute('data-theme');
            const next = cur === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('iaop-theme', next);
            syncThemeBtn();
        });
    </script>
</body>
</html>
