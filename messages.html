<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages — IAOP</title>
    <meta name="description" content="IAOP Messages — Direct Messaging with anyone.">
    <link rel="stylesheet" href="css/globals.css?v=25">
    <link rel="stylesheet" href="css/components.css?v=25">
    <script src="js/theme.js?v=25"></script>
    <style>
        .msg-page{min-height:100vh;background:var(--bg-body);display:flex;flex-direction:column;}
        .msg-container{
            flex-grow:1;
            display:flex;
            max-width:1200px;
            margin:0 auto;
            width:100%;
            height:calc(100vh - 64px); /* subtract navbar */
        }
        .msg-sidebar{
            width:320px;
            background:var(--bg-surface);
            border-right:1px solid var(--border);
            display:flex;
            flex-direction:column;
        }
        .msg-main{
            flex-grow:1;
            background:var(--bg-body);
            display:flex;
            flex-direction:column;
            position:relative;
        }
        .msg-sidebar-header{
            padding:1.25rem;
            border-bottom:1px solid var(--border);
        }
        .msg-search-wrap{
            position:relative;
            display:flex;
            align-items:center;
            background:var(--bg-body);
            border:1px solid var(--border);
            border-radius:var(--radius-full);
            padding:0.5rem 1rem;
            margin-top:1rem;
        }
        .msg-search-wrap input{
            border:none;
            background:transparent;
            outline:none;
            flex-grow:1;
            font-size:0.875rem;
            color:var(--text-primary);
            margin-left:0.5rem;
        }
        .msg-list{
            flex-grow:1;
            overflow-y:auto;
        }
        .msg-item{
            display:flex;
            align-items:center;
            gap:0.75rem;
            padding:1rem 1.25rem;
            border-bottom:1px solid var(--border);
            cursor:pointer;
            transition:background var(--dur-fast);
        }
        .msg-item:hover{background:var(--bg-body);}
        .msg-item.active{background:rgba(16,185,129,0.1); border-right:3px solid var(--primary);}
        .msg-avatar{
            width:44px;
            height:44px;
            border-radius:50%;
            background:var(--gradient-brand);
            display:flex;
            align-items:center;
            justify-content:center;
            color:#fff;
            font-weight:700;
            overflow:hidden;
        }
        .msg-info{flex-grow:1;overflow:hidden;}
        .msg-name{font-weight:700;font-size:0.95rem;color:var(--text-primary);margin-bottom:0.125rem;}
        .msg-preview{font-size:0.8rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .msg-username{font-size:0.75rem;color:var(--text-muted);}

        /* Main Chat Area */
        .chat-header{
            padding:1.25rem;
            background:var(--bg-surface);
            border-bottom:1px solid var(--border);
            display:flex;
            align-items:center;
            gap:0.75rem;
        }
        .chat-messages{
            flex-grow:1;
            padding:1.5rem;
            overflow-y:auto;
            display:flex;
            flex-direction:column;
            gap:0.75rem;
        }
        .chat-input-area{
            padding:1.25rem;
            background:var(--bg-surface);
            border-top:1px solid var(--border);
        }
        
        .empty-chat{
            flex-grow:1;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            color:var(--text-muted);
        }
        
        @media(max-width:768px){
            .msg-sidebar{width:100%;}
            .msg-main{display:none;}
            .msg-main.active{display:flex; position:absolute; top:0; left:0; width:100%; height:100%; z-index:10;}
        }
    </style>
</head>
<body class="msg-page">

    <!-- Navbar -->
    <nav class="navbar">
        <a href="dashboard.html" class="nav-brand">
            <div class="nav-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            </div>
            <span class="nav-brand-text">IAOP</span>
        </a>

        <div class="nav-spacer"></div>

        <div class="nav-right">
            <!-- Messages Link -->
            <a href="messages.html" class="btn btn-ghost btn-icon" style="color:var(--primary);" title="Direct Messages">
                <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
            </a>

            <!-- Profile -->
            <div class="dropdown">
                <div class="avatar" id="btn-profile-menu" tabindex="0" role="button">?</div>
                <div class="dropdown-menu" id="profile-dropdown">
                    <div class="profile-header">
                        <div class="profile-name" id="user-name">Loading...</div>
                        <div class="profile-email" id="user-email"></div>
                        <div style="font-size:0.75rem;color:var(--primary);margin-top:0.25rem;font-weight:700;" id="user-username"></div>
                    </div>
                    <div class="dropdown-sep"></div>
                    <button class="dropdown-item" id="btn-edit-profile-trigger">
                        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                        Edit Profile
                    </button>
                    <button class="dropdown-item" id="theme-toggle">
                        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                        Toggle Theme
                    </button>
                    <div class="dropdown-sep"></div>
                    <button class="dropdown-item danger" id="btn-logout-trigger">
                        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        Sign out
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="msg-container">
        <!-- Sidebar -->
        <div class="msg-sidebar">
            <div class="msg-sidebar-header">
                <h2 style="font-size:1.25rem;font-weight:800;color:var(--text-primary);">Messages</h2>
                <form id="user-search-form" class="msg-search-wrap">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="color:var(--text-muted)"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" id="user-search-input" placeholder="Search by @username..." required>
                </form>
            </div>
            <div class="msg-list" id="recent-chats-list">
                <div style="padding:2rem;text-align:center;color:var(--text-muted);font-size:0.875rem;">Loading chats...</div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="msg-main" id="msg-main-area">
            <div class="empty-chat" id="empty-chat-state">
                <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1" style="color:var(--border);margin-bottom:1rem;"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                <h3 style="font-size:1.2rem;font-weight:700;color:var(--text-primary);margin-bottom:0.5rem;">Your Messages</h3>
                <p style="font-size:0.9rem;">Search for a username or select a chat to start messaging.</p>
            </div>

            <div id="active-chat-view" style="display:none;flex-direction:column;height:100%;">
                <div class="chat-header">
                    <button class="btn btn-ghost btn-icon" id="btn-back-to-list" style="display:none;" onclick="closeMobileChat()">
                        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                    <div id="active-chat-avatar" class="msg-avatar" style="width:36px;height:36px;font-size:0.9rem;"></div>
                    <div>
                        <div id="active-chat-name" class="msg-name" style="margin:0;"></div>
                        <div id="active-chat-username" class="msg-username"></div>
                    </div>
                </div>
                <div class="chat-messages" id="chat-messages">
                    <!-- Messages go here -->
                </div>
                <div class="chat-input-area">
                    <form id="chat-form" style="display:flex;gap:0.75rem;">
                        <input type="text" id="chat-input" class="input" placeholder="Type a message..." style="flex-grow:1;border-radius:var(--radius-full);" required>
                        <button type="submit" class="btn btn-primary btn-icon" style="border-radius:50%;width:44px;height:44px;padding:0;"><svg width="18" height="18" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></svg></button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Logout Confirm -->
    <div id="modal-logout-confirm" class="modal-overlay">
        <div class="modal modal-sm">
            <div class="modal-body" style="text-align:center;padding:2rem">
                <div class="empty-icon" style="background:var(--danger-soft);border-color:rgba(239,68,68,0.2);color:var(--danger);margin-bottom:1rem">
                    <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                </div>
                <h3 style="margin-bottom:0.5rem;">Sign out of IAOP?</h3>
                <div style="display:flex;gap:0.75rem;margin-top:1.5rem;">
                    <button type="button" class="btn btn-outline btn-full close-modal">Cancel</button>
                    <button type="button" class="btn btn-danger btn-full" id="btn-confirm-logout">Sign Out</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Edit Profile -->
    <div id="modal-edit-profile" class="modal-overlay">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h3 class="modal-title">Edit Profile</h3>
                <button class="btn btn-ghost btn-icon close-modal">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form id="form-edit-profile">
                <div class="modal-body" style="padding-bottom:0">
                    <div class="form-group">
                        <label class="form-label">Display Name</label>
                        <input type="text" id="edit-profile-name" class="input" placeholder="Your full name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Unique Username</label>
                        <input type="text" id="edit-profile-username" class="input" placeholder="e.g. mayur_s" required pattern="^[a-zA-Z0-9_]{3,15}$" title="3-15 characters, letters, numbers, and underscores only.">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline close-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="btn-save-profile">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js?v=25"></script>
    <script src="js/auth.js?v=25"></script>
    <script src="js/messages.js?v=25"></script>
</body>
</html>
